# Cloudflare Worker that serves shared Boothique results to users for 72 hours.
#
# Setup:
#   1. npm install            (inside worker/)
#   2. npx wrangler r2 bucket create boothique-shares
#   3. Set PUBLIC_BASE_URL below to this Worker's public URL (or a custom domain).
#   4. npx wrangler deploy
#
# Retention: USER read access is cut off at exactly 72h (enforced in code — the
# /s/:id page, /api/meta/:id and the photo/video assets all return 410 once
# expired). The R2 objects themselves are KEPT past 72h on purpose, so the admin
# bulk-export (worker/src/archive.ts) can back them up later.
#
# Therefore do NOT add an R2 lifecycle rule that deletes share objects — it would
# erase the very backups we're retaining. If you ever want eventual cleanup, set
# its expiry well beyond your backup cadence, never ~4 days. Audit existing rules:
#   npx wrangler r2 bucket lifecycle list boothique-shares
# and remove an unwanted one with:
#   npx wrangler r2 bucket lifecycle remove boothique-shares

name = "boothique-share"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[r2_buckets]]
binding = "SHARES"
bucket_name = "boothique-shares"

[vars]
# Public origin this Worker is served from, no trailing slash. Used to build
# share URLs and to reference stored assets from the result page.
PUBLIC_BASE_URL = "https://boothique-share.randywardhana37.workers.dev"
# Origin allowed to POST uploads (your app). Use "*" to allow any origin.
ALLOWED_ORIGIN = "*"
